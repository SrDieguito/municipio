<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
</style>

</head>

<body class="bg-gray-950 text-gray-200">

    

<div id="toast" class="fixed top-5 right-5 hidden px-5 py-3 rounded-lg shadow-lg"></div>

<div class="flex">

<aside class="w-64 h-screen bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between">
    <div>
        <h2 class="text-2xl font-bold mb-10">Checklist</h2>

        <nav class="space-y-3">
            <button onclick="loadActivities()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800">
                Actividades
            </button>

            <button onclick="loadHistory()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800">
                Historial
            </button>
        </nav>
    </div>

    <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
        Cerrar sesión
    </button>
</aside>

<main class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-8">Actividades</h1>

<div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-8 fade-in">

<div class="grid md:grid-cols-2 gap-4">

<input id="title" placeholder="Título"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<textarea id="description" placeholder="Descripción"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full"></textarea>

<!-- 🔥 INPUT PRO CON TAGS -->
<div class="col-span-2">
    <input id="peopleInput" placeholder="Escribe un nombre y presiona Enter"
    class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

    <div id="peopleTags" class="flex flex-wrap gap-2 mt-2"></div>

    <div id="suggestions"
    class="bg-gray-900 border border-gray-700 mt-2 rounded-lg hidden"></div>
</div>

<input type="datetime-local" id="start"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<input type="datetime-local" id="end"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<button onclick="createActivity()"
class="bg-blue-600 px-4 py-2 rounded-lg">
Crear actividad
</button>

</div>
</div>

<div id="activities" class="grid md:grid-cols-2 gap-5"></div>

</main>
</div>

<script>

// 🔐 SESIÓN
let user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";

// 🔔 TOAST
function showToast(msg, error = false) {
    let toast = document.getElementById("toast");

    toast.innerText = msg;
    toast.className = `fixed top-5 right-5 px-5 py-3 rounded-lg shadow-lg fade-in ${
        error ? 'bg-red-900 border border-red-700' : 'bg-gray-800 border border-gray-700'
    }`;

    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
}

// 🔥 PERSONAS
let selectedPeople = [];
let allPeople = [];

// 👥 CARGAR PERSONAS
async function loadPeople() {
    let res = await fetch('/api/people');
    allPeople = await res.json();
}

// 🎯 TAGS
function renderTags() {
    const container = document.getElementById("peopleTags");

    container.innerHTML = selectedPeople.map((p, i) => `
        <span class="bg-blue-600 px-3 py-1 rounded-full text-sm flex items-center gap-2">
            ${p}
            <button onclick="removePerson(${i})">✕</button>
        </span>
    `).join('');
}

function removePerson(index) {
    selectedPeople.splice(index, 1);
    renderTags();
}

// 🔍 AUTOCOMPLETE
function showSuggestions(value) {
    const box = document.getElementById("suggestions");

    if (!value) return box.classList.add("hidden");

    const matches = allPeople.filter(p =>
        p.name.toLowerCase().includes(value.toLowerCase())
    );

    if (matches.length === 0) return box.classList.add("hidden");

    box.innerHTML = matches.map(p => `
        <div onclick="selectSuggestion('${p.name}')"
        class="p-2 hover:bg-gray-800 cursor-pointer">
            ${p.name}
        </div>
    `).join('');

    box.classList.remove("hidden");
}

function selectSuggestion(name) {
    if (!selectedPeople.some(p => p.toLowerCase() === name.toLowerCase())) {
        selectedPeople.push(name);
        renderTags();
    }

    document.getElementById("peopleInput").value = "";
    document.getElementById("suggestions").classList.add("hidden");
}

// ⌨️ INPUT
const input = document.getElementById("peopleInput");

input.addEventListener("input", e => {
    showSuggestions(e.target.value);
});

input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();

        let value = e.target.value.trim();
        if (!value) return;

        if (!selectedPeople.some(p => p.toLowerCase() === value.toLowerCase())) {
            selectedPeople.push(value);
        }

        renderTags();
        e.target.value = "";
        document.getElementById("suggestions").classList.add("hidden");
    }
});

// ➕ CREAR
async function createActivity() {

    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    if (!title || !start || !end) {
        return showToast("Completa los campos", true);
    }

    let res = await fetch('/api/activities', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title,
            description,
            start_time: start,
            end_time: end,
            user_id: user.id,
            people_names: selectedPeople
        })
    });

    let data = await res.json();

    if (data.success) {
        showToast("Actividad creada");

        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("start").value = "";
        document.getElementById("end").value = "";

        selectedPeople = [];
        renderTags();

        loadActivities();
    } else {
        showToast("Error", true);
    }
}

// 📥 ACTIVIDADES
async function loadActivities() {

    let container = document.getElementById("activities");
    container.innerHTML = `<p class="text-gray-500">Cargando...</p>`;

    let res = await fetch('/api/activities');
    let data = await res.json();

    container.innerHTML = "";

    data
    .filter(act => act.status !== 'completed')
    .forEach(act => {

        let peopleHTML = act.activity_assignments?.length
            ? act.activity_assignments.map(a =>
                `<span class="text-xs bg-blue-600 px-2 py-1 rounded-full mr-1">
                    ${a.people?.name}
                </span>`
              ).join('')
            : '<span class="text-xs text-gray-500">Sin asignar</span>';

        let div = document.createElement("div");

        div.className = "bg-gray-900 p-5 rounded-2xl border border-gray-800 fade-in";

        div.innerHTML = `
            <h3 class="text-xl font-semibold mb-2">${act.title}</h3>

            <p class="text-sm text-gray-400 mb-3 whitespace-pre-line">
                ${act.description || 'Sin descripción'}
            </p>

            <div class="mb-3">${peopleHTML}</div>

            <p class="text-sm text-gray-400">
                Inicio: ${new Date(act.start_time).toLocaleString()}
            </p>

            <p class="text-sm text-gray-400 mb-3">
                Fin: ${new Date(act.end_time).toLocaleString()}
            </p>

            <div class="flex gap-2 mt-3">
                <button onclick="updateStatus('${act.id}', 'pending')" class="text-xs px-2 py-1 bg-gray-700 rounded">Pendiente</button>
                <button onclick="updateStatus('${act.id}', 'in_progress')" class="text-xs px-2 py-1 bg-yellow-600 rounded">En curso</button>
                <button onclick="openModal('${act.id}')" class="text-xs px-2 py-1 bg-green-600 rounded">Finalizar</button>
            </div>
        `;

        container.appendChild(div);
    });
}

// 📜 HISTORIAL (🔥 FIX REAL)
async function loadHistory() {

    let container = document.getElementById("activities");
    container.innerHTML = `<p class="text-gray-500">Cargando historial...</p>`;

    let res = await fetch('/api/activities');
    let data = await res.json();

    container.innerHTML = "";

    data
    .filter(act => act.status === 'completed')
    .forEach(act => {

        let peopleHTML = act.activity_assignments?.length
            ? act.activity_assignments.map(a =>
                `<span class="text-xs bg-blue-600 px-2 py-1 rounded-full mr-1">
                    ${a.people?.name}
                </span>`
              ).join('')
            : '<span class="text-xs text-gray-500">Sin asignar</span>';

        let div = document.createElement("div");

        div.className = "bg-gray-900 p-5 rounded-2xl border border-gray-800 fade-in";

        div.innerHTML = `
            <h3 class="text-xl font-semibold mb-2">${act.title}</h3>

            <p class="text-sm text-gray-400 mb-3">
                ${act.description || 'Sin descripción'}
            </p>

            <div class="mb-3">${peopleHTML}</div>

            <p class="text-green-400 text-xs mb-2">Finalizado</p>

            <p class="text-sm text-gray-300">
                📝 ${act.observations || 'Sin observaciones'}
            </p>
        `;

        container.appendChild(div);
    });
}

// 🔄 ESTADO
async function updateStatus(id, status) {

    let res = await fetch('/api/activities', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status })
    });

    let data = await res.json();

    if (data.success) {
        showToast("Estado actualizado");
        loadActivities();
    } else {
        showToast("Error", true);
    }
}

// 🧠 MODAL
let currentActivityId = null;

function openModal(id) {
    currentActivityId = id;
    document.getElementById("modalObs").classList.remove("hidden");
    document.getElementById("modalObs").classList.add("flex");
}

function closeModal() {
    document.getElementById("modalObs").classList.add("hidden");
    document.getElementById("modalObs").classList.remove("flex");
    document.getElementById("obsInput").value = "";
}

async function confirmComplete() {

    let observations = document.getElementById("obsInput").value;

    let res = await fetch('/api/activities', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id: currentActivityId,
            status: 'completed',
            observations
        })
    });

    let data = await res.json();

    if (data.success) {
        showToast("Actividad finalizada");
        closeModal();
        loadActivities();
    } else {
        showToast("Error", true);
    }
}

// INIT
loadPeople();
loadActivities();

</script>

<!-- 🔥 MODAL OBSERVACIONES -->
<div id="modalObs" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50">

    <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-md border border-gray-800 fade-in">
        
        <h2 class="text-xl font-bold mb-4">Finalizar actividad</h2>

        <textarea id="obsInput"
        placeholder="Escribe observaciones..."
        class="w-full p-3 bg-gray-800 rounded-lg border border-gray-700 mb-4"></textarea>

        <div class="flex justify-end gap-2">
            <button onclick="closeModal()"
            class="px-4 py-2 bg-gray-700 rounded-lg">
                Cancelar
            </button>

            <button onclick="confirmComplete()"
            class="px-4 py-2 bg-green-600 rounded-lg">
                Finalizar
            </button>
        </div>

    </div>
</div>

</body>
</html>
