<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
</style>

</head>

<body class="bg-gray-950 text-gray-200">

<!-- TOAST -->
<div id="toast" class="fixed top-5 right-5 hidden px-5 py-3 rounded-lg shadow-lg"></div>

<div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 h-screen bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between">

        <div>
            <h2 class="text-2xl font-bold mb-10">Checklist</h2>

            <nav class="space-y-3">
                <button onclick="loadActivities()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800 transition">
                    Actividades
                </button>

                <button onclick="loadHistory()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800 transition">
                    Historial
                </button>
            </nav>
        </div>

        <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
            Cerrar sesión
        </button>

    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-10">

        <h1 class="text-3xl font-bold mb-8">Actividades</h1>

        <!-- CREAR -->
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-8 fade-in">

            <div class="grid md:grid-cols-3 gap-4">
                <input id="title" placeholder="Título"
                class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

                <textarea id="description" placeholder="Descripción de la actividad"
                class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full mt-3"></textarea>

                <input id="people" placeholder="Encargados (ej: Juan, Pedro, Luis)"
                class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full mt-3">

                <input type="datetime-local" id="start"
                class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full mt-3">

                <input type="datetime-local" id="end"
                class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full mt-3">

                <button onclick="createActivity()"
                class="mt-4 bg-blue-600 px-4 py-2 rounded-lg">
                    Crear actividad
                </button>

        </div>

        <!-- LISTA -->
        <div id="activities" class="grid md:grid-cols-2 gap-5"></div>

    </main>

</div>

<script>

// 🔐 SESIÓN
let user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";


// 🔔 TOAST
function showToast(msg, error = false) {
    let toast = document.getElementById("toast");

    toast.innerText = msg;
    toast.className = `fixed top-5 right-5 px-5 py-3 rounded-lg shadow-lg fade-in ${
        error
            ? 'bg-red-900 border border-red-700'
            : 'bg-gray-800 border border-gray-700'
    }`;

    toast.style.display = "block";

    setTimeout(() => toast.style.display = "none", 3000);
}


// 👥 CARGAR PERSONAS
async function loadPeople() {
    try {
        let res = await fetch('/api/people');
        let data = await res.json();

        let select = document.getElementById("peopleSelect");

        select.innerHTML = data.map(p =>
            `<option value="${p.id}">${p.name} (${p.role || 'Sin rol'})</option>`
        ).join('');

    } catch {
        showToast("Error cargando personas", true);
    }
}


// ➕ CREAR ACTIVIDAD
async function createActivity() {

    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;
    let people = document.getElementById("people").value;
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    if (!title || !description || !start || !end) {
        return showToast("Completa todos los campos", true);
    }

    // 🔥 concatenar encargados en descripción
    let fullDescription = `
${description}

Encargados: ${people || 'No asignados'}
`;

    try {
        let res = await fetch('/api/activities', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title,
                description: fullDescription,
                start_time: start,
                end_time: end,
                user_id: user.id
            })
        });

        let data = await res.json();

        if (data.success) {
            showToast("Actividad creada");

            document.getElementById("title").value = "";
            document.getElementById("description").value = "";
            document.getElementById("people").value = "";
            document.getElementById("start").value = "";
            document.getElementById("end").value = "";

            loadActivities();
        } else {
            showToast("Error al crear actividad", true);
        }

    } catch {
        showToast("Error del servidor", true);
    }
}


// 📥 CARGAR ACTIVIDADES
async function loadActivities() {

    let container = document.getElementById("activities");
    container.innerHTML = `<p class="text-gray-500">Cargando...</p>`;

    try {
        let res = await fetch('/api/activities');
        let data = await res.json();

        container.innerHTML = "";

        data.forEach(act => {

            let div = document.createElement("div");
            div.className = "bg-gray-900 p-5 rounded-2xl border border-gray-800 fade-in hover:scale-105 transition";

            div.innerHTML = `
    <h3 class="text-xl font-semibold mb-2">${act.title}</h3>

    <!-- 🔥 AQUÍ VA -->
    <p class="text-sm text-gray-400 mb-3 whitespace-pre-line">
        ${act.description || 'Sin descripción'}
    </p>

    <p class="text-xs text-gray-500 mb-2">
        Creado por: ${act.users?.username || 'N/A'}
    </p>

    <p class="text-sm text-gray-400 mb-1">
        Inicio: ${new Date(act.start_time).toLocaleString()}
    </p>

    <p class="text-sm text-gray-400 mb-3">
        Fin: ${new Date(act.end_time).toLocaleString()}
    </p>

    <!-- ❌ ESTO YA NO LO NECESITAS -->
    <!-- Puedes eliminarlo si ya no usas people de la BD -->
    <!--
    <p class="text-xs text-blue-400 mb-3">
        ${
            act.activity_assignments && act.activity_assignments.length > 0
                ? act.activity_assignments
                    .map(a => a.people?.name || 'Sin nombre')
                    .join(', ')
                : 'Sin asignar'
        }
    </p>
    -->

    <div class="flex justify-between items-center">
        <button onclick="deleteActivity('${act.id}')"
            class="text-sm text-red-400 hover:text-red-300">
            Eliminar
        </button>
    </div>
            `;

            container.appendChild(div);
        });

    } catch {
        showToast("Error cargando actividades", true);
    }
}


// 🗑 ELIMINAR
async function deleteActivity(id) {
    try {
        let res = await fetch('/api/activities?id=' + id, {
            method: 'DELETE'
        });

        let data = await res.json();

        if (data.success) {
            showToast("Eliminado");
            loadActivities();
        } else {
            showToast("Error eliminando", true);
        }

    } catch {
        showToast("Error del servidor", true);
    }
}


// 📜 HISTORIAL
function loadHistory() {
    showToast("Historial próximamente");
}


// 🚪 LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
}


// 🚀 INIT
loadPeople();
loadActivities();

</script>

</body>
</html>
