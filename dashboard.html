<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease; }
</style>

</head>

<body class="bg-gray-950 text-gray-200">

<div id="toast" class="fixed top-5 right-5 hidden px-5 py-3 rounded-lg shadow-lg"></div>

<div class="flex">

<aside class="w-64 h-screen bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between">
    <div>
        <h2 class="text-2xl font-bold mb-10">Checklist</h2>

        <nav class="space-y-3">
            <button onclick="loadActivities()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800">
                Actividades
            </button>

            <button onclick="loadHistory()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-800">
                Historial
            </button>
        </nav>
    </div>

    <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
        Cerrar sesión
    </button>
</aside>

<main class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-8">Actividades</h1>

<div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-8 fade-in">

<div class="grid md:grid-cols-2 gap-4">

<input id="title" placeholder="Título"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<textarea id="description" placeholder="Descripción"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full"></textarea>

<!-- ✅ SELECT REAL DE PERSONAS -->
<input id="peopleInput" placeholder="Ej: Diego Santana, Daniel Cantos"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<input type="datetime-local" id="start"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<input type="datetime-local" id="end"
class="p-3 bg-gray-800 rounded-lg border border-gray-700 w-full">

<button onclick="createActivity()"
class="bg-blue-600 px-4 py-2 rounded-lg">
Crear actividad
</button>

</div>
</div>

<div id="activities" class="grid md:grid-cols-2 gap-5"></div>

</main>
</div>

<script>

// 🔐 SESIÓN
let user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";

// 🔔 TOAST
function showToast(msg, error = false) {
    let toast = document.getElementById("toast");

    toast.innerText = msg;
    toast.className = `fixed top-5 right-5 px-5 py-3 rounded-lg shadow-lg fade-in ${
        error ? 'bg-red-900 border border-red-700' : 'bg-gray-800 border border-gray-700'
    }`;

    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
}

// 👥 CARGAR PERSONAS
async function loadPeople() {
    let res = await fetch('/api/people');
    let data = await res.json();

    let select = document.getElementById("peopleSelect");

    select.innerHTML = data.map(p =>
        `<option value="${p.id}">${p.name} (${p.role || 'Sin rol'})</option>`
    ).join('');
}

// ➕ CREAR ACTIVIDAD
async function createActivity() {

    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    let peopleRaw = document.getElementById("peopleInput").value;

    let people_names = peopleRaw
        .split(',')
        .map(p => p.trim())
        .filter(p => p.length > 0);
        if (!title || !start || !end) {
            return showToast("Completa los campos", true);
        }

    let res = await fetch('/api/activities', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title,
            description,
            start_time: start,
            end_time: end,
            user_id: user.id,
            people_names
        })
    });

    let data = await res.json();

    if (data.success) {
        showToast("Actividad creada");

        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("start").value = "";
        document.getElementById("end").value = "";

        loadActivities();
    } else {
        showToast("Error", true);
    }
}

// 📥 CARGAR ACTIVIDADES
async function loadActivities() {

    let container = document.getElementById("activities");
    container.innerHTML = `<p class="text-gray-500">Cargando...</p>`;

    let res = await fetch('/api/activities');
    let data = await res.json();

    container.innerHTML = "";

    data.forEach(act => {

        let peopleHTML = act.activity_assignments?.length
            ? act.activity_assignments.map(a =>
                `<span class="text-xs bg-blue-600 px-2 py-1 rounded-full mr-1">
                    ${a.people?.name}
                </span>`
              ).join('')
            : '<span class="text-xs text-gray-500">Sin asignar</span>';

        let div = document.createElement("div");
        div.className = "bg-gray-900 p-5 rounded-2xl border border-gray-800 fade-in";

        div.innerHTML = `
            <h3 class="text-xl font-semibold mb-2">${act.title}</h3>

            <!-- ✅ AQUÍ VA TU P CORRECTO -->
            <p class="text-sm text-gray-400 mb-3 whitespace-pre-line">
                ${act.description || 'Sin descripción'}
            </p>

            <div class="mb-3">${peopleHTML}</div>

            <p class="text-xs text-gray-500 mb-2">
                Creado por: ${act.users?.username || 'N/A'}
            </p>

            <p class="text-sm text-gray-400">
                Inicio: ${new Date(act.start_time).toLocaleString()}
            </p>

            <p class="text-sm text-gray-400 mb-3">
                Fin: ${new Date(act.end_time).toLocaleString()}
            </p>

            <button onclick="deleteActivity('${act.id}')"
            class="text-sm text-red-400 hover:text-red-300">
                Eliminar
            </button>
        `;

        container.appendChild(div);
    });
}

// 🗑 ELIMINAR
async function deleteActivity(id) {
    let res = await fetch('/api/activities?id=' + id, { method: 'DELETE' });
    let data = await res.json();

    if (data.success) {
        showToast("Eliminado");
        loadActivities();
    } else {
        showToast("Error", true);
    }
}

// OTROS
function loadHistory() {
    showToast("Historial próximamente");
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

// INIT
loadPeople();
loadActivities();

</script>

</body>
</html>
